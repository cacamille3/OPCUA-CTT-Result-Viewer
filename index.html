<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OPC UA - CTT Results Viewer</title>
<style>
  :root {
    --bg:#1e1e1e; --panel:#252526; --border:#3c3c3c; --text:#d4d4d4; --muted:#888;
    --ok:#2ea043; --err:#f14c4c; --warn:#d7883e; --rec:#c9a227; --skip:#6b7785;
    --ns:#4a7a96; --info:#3794ff; --trace:#555; --ni:#8a6d9c;
  }
  * { box-sizing:border-box; }
  body { margin:0; font:13px/1.4 "Segoe UI",system-ui,sans-serif; background:var(--bg); color:var(--text); }
  header { padding:12px 16px; background:var(--panel); border-bottom:1px solid var(--border);
           position:sticky; top:0; z-index:5; display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
  h1 { font-size:15px; margin:0; font-weight:600; }
  input[type=file] { color:var(--text); }
  .controls { display:flex; gap:14px; align-items:center; margin-left:auto; flex-wrap:wrap; }
  label.chk { cursor:pointer; user-select:none; color:var(--muted); }
  #search { background:#333; border:1px solid var(--border); color:var(--text); padding:4px 8px; border-radius:4px; width:200px; }
  #runSel { background:#333; border:1px solid var(--border); color:var(--text); padding:3px 8px; border-radius:4px; }

  #banner { margin:0; padding:10px 16px; font-weight:600; display:none; }
  #banner.show { display:block; }

  #summary { padding:8px 16px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; }
  .pill { padding:2px 10px; border-radius:12px; font-size:12px; font-weight:600; color:#fff;
          cursor:pointer; user-select:none; border:2px solid transparent; opacity:.85; }
  .pill:hover { opacity:1; }
  .pill.active { opacity:1; border-color:#fff; box-shadow:0 0 0 1px #000 inset; }
  .badge { cursor:pointer; }
  #clearFilter { margin-left:4px; background:#333; border:1px solid var(--border); color:var(--muted);
                 padding:2px 10px; border-radius:12px; font-size:12px; cursor:pointer; display:none; }
  #clearFilter.show { display:inline-block; }

  table { width:100%; border-collapse:collapse; }
  th, td { text-align:left; padding:4px 8px; border-bottom:1px solid #2a2a2a; vertical-align:top; }
  th { position:sticky; top:0; background:var(--panel); color:var(--muted); font-weight:600; z-index:2;
       border-bottom:1px solid var(--border); }
  tr.node:hover { background:#2a2d2e; }
  .caret { cursor:pointer; display:inline-block; width:14px; color:var(--muted); }
  .name-cell { white-space:nowrap; }
  .desc { color:var(--muted); white-space:pre-wrap; }
  .ts { color:var(--muted); white-space:nowrap; font-variant-numeric:tabular-nums; }

  .badge { display:inline-block; width:106px; text-align:center; padding:1px 0; border-radius:4px;
           font-size:11px; font-weight:700; color:#fff; white-space:nowrap; }
  /* colored by MEANING (category), not raw code, so both CTT schemes work */
  .c-err{background:var(--err)} .c-warn{background:var(--warn)} .c-rec{background:var(--rec)}
  .c-ni{background:var(--ni)} .c-skip{background:var(--skip)} .c-ns{background:var(--ns)}
  .c-ok{background:var(--ok)} .c-trace{background:var(--trace)} .c-info{background:var(--info)}
  /* left accent bar on the name cell colored by result category */
  td.name-cell{border-left:3px solid transparent}
  tr.cat-err td.name-cell{border-left-color:var(--err)} tr.cat-warn td.name-cell{border-left-color:var(--warn)}
  tr.cat-rec td.name-cell{border-left-color:var(--rec)} tr.cat-ok td.name-cell{border-left-color:var(--ok)}
  tr.cat-skip td.name-cell{border-left-color:var(--skip)} tr.cat-ns td.name-cell{border-left-color:var(--ns)}
  tr.cat-ni td.name-cell{border-left-color:var(--ni)}

  #empty { padding:40px 16px; color:var(--muted); }
  code { background:#333; padding:1px 5px; border-radius:3px; }
</style>
</head>
<body>
<header>
  <h1>OPC UA - CTT Results Viewer</h1>
  <input type="file" id="file" accept=".xml">
  <div class="controls">
    <input type="text" id="search" placeholder="Filter by name…">
    <label class="chk"><input type="checkbox" id="hideTrace" checked> hide Backtrace</label>
    <label class="chk"><input type="checkbox" id="onlyProblems"> only errors/warnings</label>
    <button id="expandAll">Expand all</button>
    <button id="collapseAll">Collapse all</button>
  </div>
</header>

<div id="banner"></div>
<div id="summary"></div>

<div id="empty">Open a <code>*.results.xml</code> file (or drag it onto this window) to begin.</div>

<table id="tbl" hidden>
  <thead><tr><th>Name</th><th style="width:120px">Result</th><th style="width:170px">Timestamp</th><th>Description</th></tr></thead>
  <tbody id="rows"></tbody>
</table>

<script>
// Different OPC UA CTT versions use different testresult NUMBERS for the same
// meaning. We map each version's numbers to a shared set of CATEGORIES, then
// color/label by category. Two schemes are known:
//   new    (OPC UA CTT 1.4.12+, has binaryversion + groupkey): Backtrace=7, OK=6
//   legacy (older tool, no version/groupkey attrs):    Backtrace=6, OK=5
const CAT = {
  error:   {l:'Error',           c:'c-err'},
  warn:    {l:'Warning',         c:'c-warn'},
  rec:     {l:'Recommendation',  c:'c-rec'},
  notimpl: {l:'Not Implemented', c:'c-ni'},
  skip:    {l:'Skipped',         c:'c-skip'},
  ns:      {l:'Not Supported',   c:'c-ns'},
  ok:      {l:'OK',              c:'c-ok'},
  trace:   {l:'Backtrace',       c:'c-trace'},
};
const SCHEMES = {
  'new':    {0:'error',1:'warn',2:'rec',    3:'notimpl',4:'skip',5:'ns',   6:'ok',   7:'trace'},
  'legacy': {0:'error',1:'warn',2:'notimpl',3:'skip',   4:'ns',  5:'ok',   6:'trace'},
};
let scheme = 'new';                 // set per file in render()
function catOf(code){ return (SCHEMES[scheme]||{})[code] || 'info'; }
function meta(code){ return CAT[catOf(code)] || {l:'('+code+')', c:'c-info'}; }

// Decide which scheme a parsed document uses.
function detectScheme(doc){
  // strongest signals for the "new" tool: version attrs or groupkey markers
  const root = doc.querySelector('UaCttResults > ResultNode') || doc.querySelector('ResultNode');
  if (root && (root.hasAttribute('binaryversion') || root.hasAttribute('scriptversion')
               || root.hasAttribute('specificationversion'))) return 'new';
  if (doc.querySelector('[groupkey]')) return 'new';
  // otherwise inspect a Backtrace node: code 7 => new, code 6 => legacy
  const bt = doc.querySelector('ResultNode[name="Backtrace"]');
  if (bt) return (+bt.getAttribute('testresult') === 7) ? 'new' : 'legacy';
  return 'new';
}

const SETUP = new Set(['initialize.js','cleanup.js','beforeTest.js','afterTest.js']);
function isTestCaseNode(node){
  const nm = node.getAttribute('name') || '';
  if (SETUP.has(nm)) return false;
  if (node.getAttribute('groupkey') && node.getAttribute('unitkey')) return true; // new scheme
  if (scheme === 'legacy' && /\.js$/i.test(nm)) return true;                      // legacy fallback
  return false;
}

const $ = id => document.getElementById(id);
let uid = 0;

function render(xmlText){
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  const perr = doc.querySelector('parsererror');
  if (perr){ alert('XML parse error:\n' + perr.textContent); return; }
  // a file may contain more than one run (Debug Run1, Debug Run2, …) as siblings
  let runs = [...doc.querySelectorAll('UaCttResults > ResultNode')];
  if (!runs.length){ const r = doc.querySelector('ResultNode'); if (r) runs = [r]; }
  if (!runs.length){ alert('No <ResultNode> found.'); return; }

  scheme = detectScheme(doc);          // pick the code convention for THIS file

  const rows = $('rows'); rows.innerHTML = ''; uid = 0;
  countsByRun = []; runNames = []; activeRun = null; activeCode = null;

  function walk(node, depth, parentId, runIdx){
    const code = parseInt(node.getAttribute('testresult'), 10);
    const cat = catOf(code);
    const m = meta(code);
    const id = ++uid;
    const kids = [...node.children].filter(c => c.tagName === 'ResultNode');

    const isTC = isTestCaseNode(node);                // scheme-aware test-case detection
    if (isTC) countsByRun[runIdx][code] = (countsByRun[runIdx][code]||0) + 1; // summary counts test cases only, per run

    const tr = document.createElement('tr');
    tr.className = 'node cat-' + cat;
    tr.dataset.id = id; tr.dataset.parent = parentId; tr.dataset.depth = depth;
    tr.dataset.code = code; tr.dataset.trace = (cat==='trace')?'1':'0';
    tr.dataset.tc = isTC ? '1':'0';
    tr.dataset.run = runIdx;
    tr.dataset.name = (node.getAttribute('name')||'').toLowerCase();

    const name = node.getAttribute('name') || '(node)';
    const ts = node.getAttribute('timestamp') || '';
    // Backtrace nodes carry no description; surface their location attributes instead.
    let desc = node.getAttribute('description') || '';
    if (cat === 'trace') {
      desc = 'function: ' + (node.getAttribute('functionname') || '') +
             '\r\nfile: ' + (node.getAttribute('filename') || '') +
             '\r\nline: ' + (node.getAttribute('linenumber') || '');
    }
    const caret = kids.length ? '<span class="caret" data-toggle>▸</span>' : '<span class="caret"></span>';
    const pad = depth * 18;

    tr.innerHTML =
      '<td class="name-cell" style="padding-left:'+(8+pad)+'px">'+caret+
        '<span>'+escapeHtml(name)+'</span></td>'+
      '<td><span class="badge '+m.c+'">'+m.l+'</span></td>'+
      '<td class="ts">'+escapeHtml(ts)+'</td>'+
      '<td class="desc">'+escapeHtml(desc)+'</td>';
    rows.appendChild(tr);

    kids.forEach(k => walk(k, depth+1, id, runIdx));
  }
  runs.forEach((run, i) => {              // each run is its own top-level subtree
    countsByRun.push({});
    runNames.push(run.getAttribute('name') || ('Run ' + (i+1)));
    walk(run, 0, 0, i);
  });

  // global banner (colored by the most severe run result, scheme-independent)
  const catRank = { error:0, warn:1, rec:2, ns:3, notimpl:4, skip:5, ok:6, trace:7 };
  const runResults = runs.map(r=>{
    const c = parseInt(r.getAttribute('testresult'),10);
    return { name: r.getAttribute('name')||'', cat: catOf(c), label: meta(c).l };
  });
  let worst = runResults[0].cat;
  runResults.forEach(r=>{ if ((catRank[r.cat]??9) < (catRank[worst]??9)) worst = r.cat; });
  const banner = $('banner');
  banner.className = 'show';
  const colorVar = {error:'--err',warn:'--warn',ok:'--ok'}[worst] || '--info';
  banner.style.background = getComputedStyle(document.documentElement).getPropertyValue(colorVar);
  const ver = runs[0].getAttribute('specificationversion');
  banner.textContent = (runs.length === 1)
    ? 'Global result: ' + runResults[0].label + '  —  ' + runResults[0].name
        + (ver ? '   (' + ver + ')' : '') + '   ·   format: ' + scheme
    : runs.length + ' runs  —  '
        + runResults.map(r=> r.name + ': ' + r.label).join('   ·   ')
        + (ver ? '   (' + ver + ')' : '') + '   ·   format: ' + scheme;

  // run selector (only when the file holds several runs) + summary pills
  const sum = $('summary'); sum.innerHTML = '';
  if (runs.length > 1){
    const sel = document.createElement('select');
    sel.id = 'runSel';
    sel.title = 'Restrict the view and the counts to a single run';
    sel.innerHTML = '<option value="">All runs</option>' +
      runNames.map((n,i)=>'<option value="'+i+'">'+escapeHtml(n)+'</option>').join('');
    sel.addEventListener('change', ()=>{
      activeRun = sel.value === '' ? null : +sel.value;
      // drop the result-type filter if the selected run has no such test case
      if (activeCode !== null && !(activeCode in currentCounts())) activeCode = null;
      renderSummary();
      applyFilters();
    });
    sum.appendChild(sel);
  }
  const pillBox = document.createElement('span');
  pillBox.id = 'pills'; pillBox.style.display = 'contents';
  sum.appendChild(pillBox);
  renderSummary();

  $('empty').hidden = true;
  $('tbl').hidden = false;
  applyFilters();
  // collapse to top 2 levels by default
  collapseDeeper(2);
}

function escapeHtml(s){ return s.replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

// ---- collapse / expand ----
function childrenOf(id){ return [...document.querySelectorAll('tr.node[data-parent="'+id+'"]')]; }
function setCaret(tr, collapsed){
  const caret = tr.querySelector('[data-toggle]');
  if (caret) caret.textContent = collapsed ? '▸' : '▾';
}
// Recompute hiddenByParent for every row from its ancestors' collapsed flags.
function recomputeHidden(){
  const rows = [...document.querySelectorAll('tr.node')];
  const byId = {}; rows.forEach(t=>{ byId[t.dataset.id] = t; });
  rows.forEach(tr=>{
    let hidden = false, pid = tr.dataset.parent;
    while (pid && pid !== '0' && byId[pid]) {
      if (byId[pid].dataset.collapsed === '1') { hidden = true; break; }
      pid = byId[pid].dataset.parent;
    }
    tr.dataset.hiddenByParent = hidden ? '1' : '0';
  });
}
function refreshVisibility(){ document.querySelectorAll('tr.node').forEach(updateVisibility); }
function setCollapsed(tr, collapsed){
  tr.dataset.collapsed = collapsed ? '1':'0';
  setCaret(tr, collapsed);
  recomputeHidden();
  refreshVisibility();
}
function collapseDeeper(maxDepth){
  document.querySelectorAll('tr.node').forEach(tr=>{
    if (childrenOf(tr.dataset.id).length) {
      const c = (+tr.dataset.depth >= maxDepth);
      tr.dataset.collapsed = c ? '1':'0';
      setCaret(tr, c);
    }
  });
  recomputeHidden();
  refreshVisibility();
}

// ---- summary (per-run counts) ----
let activeRun = null;    // run index selected in #runSel, or null for all runs
let countsByRun = [];    // per-run {code: testCaseCount}
let runNames = [];       // display name of each run

function currentCounts(){
  if (activeRun !== null) return countsByRun[activeRun] || {};
  const merged = {};
  countsByRun.forEach(c => Object.keys(c).forEach(k => { merged[k] = (merged[k]||0) + c[k]; }));
  return merged;
}
// (Re)build the total + pills from the counts of the selected run (or all runs).
function renderSummary(){
  const counts = currentCounts();
  const box = $('pills'); box.innerHTML = '';
  const totalTC = Object.values(counts).reduce((a,b)=>a+b,0);
  const tot = document.createElement('span');
  tot.style.cssText = 'font-weight:600;color:var(--muted);margin-right:4px';
  tot.textContent = totalTC + ' test cases:';
  box.appendChild(tot);
  Object.keys(counts).sort((a,b)=>a-b).forEach(code=>{
    const m = meta(+code);
    const el = document.createElement('span');
    el.className = 'pill ' + m.c + (activeCode !== null && +code === activeCode ? ' active' : '');
    el.dataset.code = code;
    el.textContent = m.l + ': ' + counts[code];
    el.title = 'Click to show only "' + m.l + '"';
    box.appendChild(el);
  });
  const clr = document.createElement('span');
  clr.id = 'clearFilter'; clr.textContent = '✕ clear';
  clr.title = 'Clear result-type filter';
  if (activeCode !== null) clr.className = 'show';
  box.appendChild(clr);
}

// ---- filters ----
let activeCode = null;   // result code selected via a pill/badge, or null
function setCodeFilter(code){
  activeCode = (activeCode === code) ? null : code;   // toggle
  document.querySelectorAll('.pill').forEach(p=>
    p.classList.toggle('active', activeCode!==null && p.dataset.code===String(activeCode)));
  const clr = $('clearFilter'); if (clr) clr.classList.toggle('show', activeCode!==null);
  applyFilters();
}
function applyFilters(){
  const q = $('search').value.trim().toLowerCase();
  const hideTrace = $('hideTrace').checked;
  const onlyProb = $('onlyProblems').checked;
  narrowing = (activeCode!==null) || onlyProb || q.length>0;

  const rows = [...document.querySelectorAll('tr.node')];
  const byId = {};
  rows.forEach(tr => { byId[tr.dataset.id] = tr; });

  // pass 1: does each row match the active filters on its own?
  rows.forEach(tr=>{
    let ok = true;
    // run filter: hide every row belonging to another run (not a "narrowing"
    // filter — the selected run keeps its full tree structure)
    if (activeRun!==null && tr.dataset.run!==String(activeRun)) ok = false;
    // result-code filter matches the summary: only real test cases of that code
    if (activeCode!==null && !(tr.dataset.tc==='1' && tr.dataset.code===String(activeCode))) ok = false;
    if (hideTrace && tr.dataset.trace==='1') ok = false;
    if (onlyProb && !(tr.dataset.code==='0'||tr.dataset.code==='1')) ok = false;
    if (q && !tr.dataset.name.includes(q)) ok = false;
    tr.dataset.match = ok ? '1':'0';
    tr.dataset.ancestor = '0';
  });

  // pass 2: when a narrowing filter is active, keep each match's ANCESTORS
  // (conformance group / unit) visible so you can see where the match lives.
  if (narrowing) {
    rows.forEach(tr=>{
      if (tr.dataset.match !== '1') return;
      let pid = tr.dataset.parent;
      while (pid && pid !== '0' && byId[pid] && byId[pid].dataset.ancestor !== '1') {
        byId[pid].dataset.ancestor = '1';
        pid = byId[pid].dataset.parent;
      }
    });
  }

  // pass 3: filter membership -> filtered flag (show if it matches or is an ancestor of a match)
  rows.forEach(tr=>{
    const keep = tr.dataset.match === '1' || (narrowing && tr.dataset.ancestor === '1');
    tr.dataset.filtered = keep ? '0' : '1';
  });
  // when narrowing, auto-expand the ancestor chains so matches are revealed;
  // the user can still collapse/expand those groups within the filtered view.
  if (narrowing) {
    rows.forEach(tr=>{
      if (tr.dataset.ancestor === '1' && childrenOf(tr.dataset.id).length) {
        tr.dataset.collapsed = '0'; setCaret(tr, false);
      }
    });
  }
  recomputeHidden();
  refreshVisibility();
}
let narrowing = false;   // true when a row-narrowing filter is active
function updateVisibility(tr){
  const hidden = tr.dataset.filtered==='1' || tr.dataset.hiddenByParent==='1';
  tr.style.display = hidden ? 'none' : '';
}

// ---- events ----
$('file').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader(); r.onload = ()=>render(r.result); r.readAsText(f);
});
document.addEventListener('click', e=>{
  // expand/collapse caret
  const t = e.target.closest('[data-toggle]');
  if (t){ const tr = t.closest('tr'); setCollapsed(tr, tr.dataset.collapsed!=='1'); return; }
  // clear result-type filter
  if (e.target.id === 'clearFilter'){ if(activeCode!==null) setCodeFilter(activeCode); return; }
  // click a summary pill -> filter by that result code
  const pill = e.target.closest('.pill');
  if (pill){ setCodeFilter(+pill.dataset.code); return; }
  // click a test-case row's result badge -> filter by that result code
  const badge = e.target.closest('.badge');
  if (badge){ const tr = badge.closest('tr.node'); if(tr && tr.dataset.tc==='1') setCodeFilter(+tr.dataset.code); return; }
});
$('search').addEventListener('input', applyFilters);
$('hideTrace').addEventListener('change', applyFilters);
$('onlyProblems').addEventListener('change', applyFilters);
$('expandAll').addEventListener('click', ()=>{
  document.querySelectorAll('tr.node').forEach(tr=>{ if(childrenOf(tr.dataset.id).length){ tr.dataset.collapsed='0'; setCaret(tr,false); } });
  recomputeHidden(); refreshVisibility();
});
$('collapseAll').addEventListener('click', ()=>collapseDeeper(1));

// drag & drop
['dragover','drop'].forEach(ev=>document.addEventListener(ev, e=>e.preventDefault()));
document.addEventListener('drop', e=>{
  const f = e.dataTransfer.files[0]; if(!f) return;
  const r = new FileReader(); r.onload = ()=>render(r.result); r.readAsText(f);
});
</script>
</body>
</html>
